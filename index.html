<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bubble Text Generator</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #f5f5f7;
    color: #111;
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }
  aside {
    background: #fff;
    border-right: 1px solid #e5e5ea;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }
  main {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #666; margin-bottom: 8px; }
  label { font-size: 12px; font-weight: 600; color: #333; display: block; margin-bottom: 4px; }
  input[type=text], input[type=file], select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
  }
  input[type=range] { width: 100%; }
  .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .row .val { font-size: 12px; color: #666; font-variant-numeric: tabular-nums; }
  button {
    padding: 10px 14px;
    border: 0;
    border-radius: 8px;
    background: #0a84ff;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  button.secondary { background: #e5e5ea; color: #111; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { flex: 1; }
  #stage {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.08);
    width: 100%;
    height: 100%;
    max-width: 1100px;
    max-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  svg.preview, canvas#three {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    display: block;
  }
  canvas#three { background: linear-gradient(180deg,#eef1f6,#cfd6e2); }
  body.mode3d-on canvas#three { display: block; }
  body.mode3d-on svg.preview     { display: none; }
  body:not(.mode3d-on) canvas#three { display: none; }
  .spinner {
    position: absolute; top: 12px; right: 12px;
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid #ccc; border-top-color: #0a84ff;
    animation: spin .8s linear infinite; opacity: 0; transition: opacity .15s;
    pointer-events: none; z-index: 5;
  }
  .spinner.on { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 11px; color: #888; line-height: 1.4; }
  .checkbox { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  details { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 8px 10px; }
  details summary { cursor: pointer; font-size: 12px; font-weight: 600; }
  hr { border: 0; border-top: 1px solid #eee; margin: 4px 0; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #eee; }
    aside { background: #2c2c2e; border-color: #3a3a3c; }
    input, select { background: #1c1c1e; color: #eee; border-color: #3a3a3c; }
    button.secondary { background: #3a3a3c; color: #eee; }
    #stage { background: #2c2c2e; }
    canvas#three { background: linear-gradient(180deg,#1f2228,#0d1015); }
    details { background: #1c1c1e; border-color: #3a3a3c; }
    .sub, .hint, .row .val { color: #aaa; }
    label { color: #ddd; }
  }
</style>
</head>
<body>
<aside>
  <div>
    <h1>Bubble Text Generator</h1>
    <div class="sub">Procedural inflate of any font</div>
  </div>

  <div>
    <label for="text">Text</label>
    <input id="text" type="text" value="POPCAM" autocomplete="off" />
  </div>

  <div>
    <label for="font">Font (.ttf / .otf)</label>
    <input id="font" type="file" accept=".ttf,.otf,.woff" />
    <div class="hint">Or pick a built-in heavy font below.</div>
  </div>

  <div>
    <label for="builtin">Built-in font</label>
    <select id="builtin">
      <option value="https://raw.githubusercontent.com/google/fonts/main/ofl/bagelfatone/BagelFatOne-Regular.ttf">Bagel Fat One (very puffy)</option>
      <option value="https://raw.githubusercontent.com/google/fonts/main/apache/luckiestguy/LuckiestGuy-Regular.ttf">Luckiest Guy</option>
      <option value="https://raw.githubusercontent.com/google/fonts/main/ofl/sniglet/Sniglet-Regular.ttf">Sniglet</option>
      <option value="https://raw.githubusercontent.com/google/fonts/main/ofl/bungee/Bungee-Regular.ttf">Bungee</option>
      <option value="https://raw.githubusercontent.com/google/fonts/main/ofl/bowlbyonesc/BowlbyOneSC-Regular.ttf">Bowlby One SC</option>
      <option value="https://raw.githubusercontent.com/google/fonts/main/ofl/passionone/PassionOne-Black.ttf">Passion One Black</option>
      <option value="https://raw.githubusercontent.com/google/fonts/main/ofl/changaone/ChangaOne-Regular.ttf">Changa One</option>
    </select>
  </div>

  <hr />

  <div>
    <div class="row"><label for="inflate">Inflate</label><span class="val" id="inflateVal">14</span></div>
    <input id="inflate" type="range" min="0" max="60" value="14" />
  </div>

  <div>
    <div class="row"><label for="blur">Bubble blend</label><span class="val" id="blurVal">3</span></div>
    <input id="blur" type="range" min="0" max="20" value="3" />
    <div class="hint">Higher = letters merge into a softer single blob.</div>
  </div>

  <div>
    <div class="row"><label for="spacing">Letter spacing</label><span class="val" id="spacingVal">-30</span></div>
    <input id="spacing" type="range" min="-100" max="100" value="-30" />
  </div>

  <div>
    <label class="checkbox"><input id="merge" type="checkbox" checked /> Soft-blend touching letters</label>
  </div>

  <hr />

  <details open>
    <summary>3D balloon</summary>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
      <label class="checkbox"><input id="mode3d" type="checkbox" /> 3D mode (drag to rotate, scroll to zoom)</label>
      <div>
        <div class="row"><label for="thickness">Thickness</label><span class="val" id="thicknessVal">0.55</span></div>
        <input id="thickness" type="range" min="0.1" max="1.5" step="0.05" value="0.55" />
      </div>
      <div>
        <div class="row"><label for="meshDensity">Mesh density</label><span class="val" id="meshDensityVal">14</span></div>
        <input id="meshDensity" type="range" min="6" max="28" step="1" value="14" />
        <div class="hint">Smaller triangles = smoother surface, slower.</div>
      </div>
      <div>
        <div class="row"><label for="glossy">Gloss</label><span class="val" id="glossyVal">0.85</span></div>
        <input id="glossy" type="range" min="0" max="1" step="0.05" value="0.85" />
      </div>
    </div>
  </details>

  <details>
    <summary>Style</summary>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
      <div>
        <label for="fill">Fill</label>
        <input id="fill" type="color" value="#ff2d55" />
      </div>
      <label class="checkbox"><input id="threeD" type="checkbox" checked /> 2D shading (highlight + shadow)</label>
      <label class="checkbox"><input id="outline" type="checkbox" /> White outline</label>
      <div>
        <div class="row"><label for="outlineW">Outline width</label><span class="val" id="outlineWVal">8</span></div>
        <input id="outlineW" type="range" min="0" max="30" value="8" />
      </div>
    </div>
  </details>

  <details>
    <summary>Quality</summary>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
      <div>
        <div class="row"><label for="quality">Resolution</label><span class="val" id="qualityVal">1.5</span></div>
        <input id="quality" type="range" min="0.5" max="3" step="0.1" value="1.5" />
      </div>
      <label class="checkbox"><input id="liveDrag" type="checkbox" checked /> Lower quality while dragging</label>
    </div>
  </details>

  <div class="btn-row">
    <button id="dlSvg">Download SVG</button>
    <button id="dlPng" class="secondary">Download PNG</button>
  </div>
  <div class="hint" id="status">Loading default font…</div>
</aside>
<main>
  <div id="stage">
    <svg class="preview" id="preview" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs id="svgDefs"></defs>
      <path id="mainPath" />
      <path id="outlinePath" fill="none" stroke="#fff" stroke-linejoin="round" stroke-linecap="round" />
      <path id="hiPath" />
    </svg>
    <canvas id="three"></canvas>
    <div class="spinner" id="spin"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/delaunator@5/delaunator.min.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const canvas = document.getElementById('three');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = null;

// Procedural studio environment for nice reflections.
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const envTex = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environment = envTex;

const camera = new THREE.PerspectiveCamera(35, 1, 0.01, 5000);
camera.position.set(0, 0, 800);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 50;
controls.maxDistance = 4000;

const dir = new THREE.DirectionalLight(0xffffff, 0.6);
dir.position.set(2, 3, 4);
scene.add(dir);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

const material = new THREE.MeshPhysicalMaterial({
  color: 0xff2d55,
  metalness: 0.0,
  roughness: 0.25,
  clearcoat: 1.0,
  clearcoatRoughness: 0.08,
  sheen: 0.5,
  sheenRoughness: 0.4,
  reflectivity: 0.6,
  side: THREE.DoubleSide,
});

let currentMesh = null;
function disposeMesh() {
  if (currentMesh) {
    scene.remove(currentMesh);
    currentMesh.geometry.dispose();
    currentMesh = null;
  }
}

function fitCamera(box) {
  const size = new THREE.Vector3();
  box.getSize(size);
  const center = new THREE.Vector3();
  box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z);
  const fitDist = maxDim / (2 * Math.tan((camera.fov * Math.PI) / 360));
  camera.position.set(center.x, center.y, center.z + fitDist * 1.6);
  camera.lookAt(center);
  controls.target.copy(center);
  controls.update();
}

function resize() {
  const w = canvas.clientWidth || 600;
  const h = canvas.clientHeight || 400;
  if (renderer.domElement.width !== w || renderer.domElement.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}
new ResizeObserver(resize).observe(canvas);
resize();

let needsRender = true;
controls.addEventListener('change', () => { needsRender = true; });
function loop() {
  controls.update();
  if (needsRender) {
    renderer.render(scene, camera);
    needsRender = false;
  }
  requestAnimationFrame(loop);
}
loop();

/* ============================================================
   Mesh-building helpers exposed on window for the classic-script
   side to call.
   ============================================================ */

// Earcut takes flat verts + hole start indices. For multiple disjoint
// outer rings (which we get when letters are far apart), we need to
// triangulate each "shape" (one outer + its holes) separately.
function pointInRing(px, py, ring) {
  let inside = false;
  const n = ring.length;
  for (let i = 0, j = n - 2; i < n; j = i, i += 2) {
    const xi = ring[i], yi = ring[i + 1];
    const xj = ring[j], yj = ring[j + 1];
    if ((yi > py) !== (yj > py) &&
        px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

function ringSignedArea(ring) {
  let area = 0;
  for (let i = 0; i < ring.length; i += 2) {
    const j = (i + 2) % ring.length;
    area += ring[i] * ring[j+1] - ring[j] * ring[i+1];
  }
  return area * 0.5;
}

// Reverse a flat ring [x0,y0,x1,y1,...] in place.
function reverseRing(ring) {
  const n = ring.length;
  for (let i = 0, k = n - 2; i < k; i += 2, k -= 2) {
    const tx = ring[i], ty = ring[i+1];
    ring[i] = ring[k]; ring[i+1] = ring[k+1];
    ring[k] = tx; ring[k+1] = ty;
  }
}

function classifyShapes(rings) {
  // Use the FIRST VERTEX of each ring as the topology probe. The first vertex
  // sits on the ring's own boundary, so it's never inside its own ring, but
  // it is reliably inside any ring that strictly contains this ring (because
  // a ring fully contained in a parent has its boundary fully inside the
  // parent, including the first vertex). Centroids fail here because the
  // centroid of an outer ring with a hole can land *inside the hole* —
  // making the outer ring look like a hole. The first vertex never has
  // that problem.
  const probes = rings.map(r => [r[0], r[1]]);
  const info = rings.map((_, i) => {
    let count = 0, parent = -1, parentSize = Infinity;
    for (let j = 0; j < rings.length; j++) {
      if (i === j) continue;
      if (pointInRing(probes[i][0], probes[i][1], rings[j])) {
        count++;
        if (rings[j].length < parentSize) {
          parentSize = rings[j].length;
          parent = j;
        }
      }
    }
    return { count, parent };
  });

  const outers = [];
  const outerByIndex = new Map();
  for (let i = 0; i < rings.length; i++) {
    if (info[i].count % 2 === 0) {
      const o = { ring: rings[i], holes: [], originalIndex: i };
      outers.push(o);
      outerByIndex.set(i, o);
    }
  }
  for (let i = 0; i < rings.length; i++) {
    if (info[i].count % 2 === 1 && info[i].parent !== -1) {
      const p = outerByIndex.get(info[i].parent);
      if (p) p.holes.push(rings[i]);
    }
  }
  return outers;
}

// Triangulate a shape (outer ring + holes) with constrained-ish Delaunay.
// Strategy: include outline vertices + a hex grid of interior Steiner points,
// then run Delaunator on the union, then filter to keep only triangles whose
// centroid is inside (outer ring AND not inside any hole). Result: clean,
// near-equilateral triangles — no slivers, no fan artifacts.
function triangulateShape(outerRing, holes, gridSpacing) {
  const pts = [];
  for (let i = 0; i < outerRing.length; i += 2) pts.push(outerRing[i], outerRing[i+1]);
  for (const h of holes) {
    for (let i = 0; i < h.length; i += 2) pts.push(h[i], h[i+1]);
  }

  // Bounding box of outer ring (where Steiner points can possibly fall)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (let i = 0; i < outerRing.length; i += 2) {
    if (outerRing[i]   < minX) minX = outerRing[i];   if (outerRing[i]   > maxX) maxX = outerRing[i];
    if (outerRing[i+1] < minY) minY = outerRing[i+1]; if (outerRing[i+1] > maxY) maxY = outerRing[i+1];
  }

  // Hex (offset) grid for nicer triangulation than a square grid.
  const dx = gridSpacing;
  const dy = gridSpacing * 0.866; // sqrt(3)/2
  const minDistSq = (gridSpacing * 0.45) * (gridSpacing * 0.45);

  // Build a small spatial bin of outline points so we can reject Steiner
  // points that fall too close to any outline vertex (those create
  // degenerate slivers that survive Delaunay).
  const binSize = gridSpacing;
  const bins = new Map();
  const binKey = (gx, gy) => gx * 1e6 + gy;
  for (let i = 0; i < pts.length; i += 2) {
    const gx = Math.floor(pts[i] / binSize), gy = Math.floor(pts[i+1] / binSize);
    for (let oy = -1; oy <= 1; oy++) for (let ox = -1; ox <= 1; ox++) {
      const k = binKey(gx + ox, gy + oy);
      let arr = bins.get(k); if (!arr) { arr = []; bins.set(k, arr); }
      arr.push(pts[i], pts[i+1]);
    }
  }
  function tooClose(x, y) {
    const k = binKey(Math.floor(x / binSize), Math.floor(y / binSize));
    const arr = bins.get(k);
    if (!arr) return false;
    for (let i = 0; i < arr.length; i += 2) {
      const ddx = arr[i] - x, ddy = arr[i+1] - y;
      if (ddx*ddx + ddy*ddy < minDistSq) return true;
    }
    return false;
  }

  let row = 0;
  for (let y = minY + dy * 0.5; y < maxY; y += dy, row++) {
    const xOff = (row & 1) ? dx * 0.5 : 0;
    for (let x = minX + xOff + dx * 0.5; x < maxX; x += dx) {
      if (tooClose(x, y)) continue;
      if (!pointInRing(x, y, outerRing)) continue;
      let inHole = false;
      for (const h of holes) {
        if (pointInRing(x, y, h)) { inHole = true; break; }
      }
      if (!inHole) pts.push(x, y);
    }
  }

  if (pts.length < 6) return { positions: pts, indices: [] };
  const coords = new Float64Array(pts);
  let delaunay;
  try { delaunay = new Delaunator(coords); }
  catch (e) { return { positions: pts, indices: [] }; }
  const tris = delaunay.triangles;

  const kept = [];
  for (let i = 0; i < tris.length; i += 3) {
    const a = tris[i], b = tris[i+1], c = tris[i+2];
    const cx = (coords[a*2]   + coords[b*2]   + coords[c*2])   / 3;
    const cy = (coords[a*2+1] + coords[b*2+1] + coords[c*2+1]) / 3;
    if (!pointInRing(cx, cy, outerRing)) continue;
    let inHole = false;
    for (const h of holes) {
      if (pointInRing(cx, cy, h)) { inHole = true; break; }
    }
    if (inHole) continue;
    kept.push(a, b, c);
  }
  return { positions: pts, indices: kept };
}

// Compute distance from a 2D point to a polyline (flat ring), squared.
function distToRingSq(px, py, ring) {
  let best = Infinity;
  const n = ring.length / 2;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const ax = ring[i*2], ay = ring[i*2+1];
    const bx = ring[j*2], by = ring[j*2+1];
    const dx = bx - ax, dy = by - ay;
    const len2 = dx*dx + dy*dy || 1;
    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    if (t < 0) t = 0; else if (t > 1) t = 1;
    const cx = ax + t * dx, cy = ay + t * dy;
    const ddx = px - cx, ddy = py - cy;
    const d = ddx*ddx + ddy*ddy;
    if (d < best) best = d;
  }
  return best;
}

function buildBalloonMesh(rings, params) {
  if (!rings || rings.length === 0) return null;
  const shapes = classifyShapes(rings);
  if (shapes.length === 0) return null;

  // Global bbox in world (Y-up math) coords
  let gMinX = Infinity, gMinY = Infinity, gMaxX = -Infinity, gMaxY = -Infinity;
  for (const r of rings) for (let i = 0; i < r.length; i += 2) {
    if (r[i]   < gMinX) gMinX = r[i];   if (r[i]   > gMaxX) gMaxX = r[i];
    if (r[i+1] < gMinY) gMinY = r[i+1]; if (r[i+1] > gMaxY) gMaxY = r[i+1];
  }
  if (!isFinite(gMinX)) return null;

  // Use the glyph's smaller axis as the "letter scale". Hex grid spacing
  // scales inversely with mesh density.
  const charScale = Math.min(gMaxY - gMinY, gMaxX - gMinX);
  const gridSpacing = Math.max(2, charScale / params.meshDensity);

  // Final, deduplicated positions / indices for the merged mesh.
  const finalPos = []; // x, y, z triples
  const finalIdx = [];

  for (const sh of shapes) {
    const tri = triangulateShape(sh.ring, sh.holes, gridSpacing);
    const pos = tri.positions;
    const idx = tri.indices;
    if (idx.length === 0) continue;
    const numVerts = pos.length / 2;

    // Per-vertex distance to nearest boundary (this shape's outer + holes)
    const shapeRings = [sh.ring, ...sh.holes];
    const dist = new Float32Array(numVerts);
    let localMaxDist = 0;
    for (let v = 0; v < numVerts; v++) {
      const px = pos[v*2], py = pos[v*2+1];
      let dSq = Infinity;
      for (const r of shapeRings) {
        const d = distToRingSq(px, py, r);
        if (d < dSq) dSq = d;
      }
      dist[v] = Math.sqrt(dSq);
      if (dist[v] > localMaxDist) localMaxDist = dist[v];
    }
    if (localMaxDist <= 0.0001) continue;

    // Convert distance → puff height. Parabolic profile 2t − t² peaks at
    // t=1 with derivative 0 (round top) and meets the boundary at t=0 with
    // a finite slope of 2 (no vertical tangent → mesh-friendly, no facets).
    const thickness = params.thickness * localMaxDist;
    const heights = new Float32Array(numVerts);
    for (let v = 0; v < numVerts; v++) {
      const t = Math.min(1, dist[v] / localMaxDist);
      heights[v] = (2 * t - t * t) * thickness;
    }

    // Laplacian-smooth the height field across the mesh. The raw per-vertex
    // distance has discontinuities along the medial axis (where a point is
    // equidistant from multiple boundary edges) — those show up as visible
    // ridges in the balloon surface. A few smoothing passes flatten them
    // out while keeping the boundary pinned at h=0.
    const isBoundary = new Uint8Array(numVerts);
    const boundaryThresh = thickness * 0.005;
    for (let v = 0; v < numVerts; v++) {
      if (heights[v] <= boundaryThresh) isBoundary[v] = 1;
    }
    // Build flat per-vertex neighbor lists from triangle indices.
    const neighborCount = new Int32Array(numVerts);
    for (let i = 0; i < idx.length; i++) neighborCount[idx[i]] += 2; // each tri contributes 2 neighbors per vertex appearance
    const neighborStart = new Int32Array(numVerts + 1);
    for (let v = 0; v < numVerts; v++) neighborStart[v + 1] = neighborStart[v] + neighborCount[v];
    const neighborBuf = new Int32Array(neighborStart[numVerts]);
    const fillCursor = new Int32Array(numVerts);
    for (let i = 0; i < idx.length; i += 3) {
      const a = idx[i], b = idx[i+1], c = idx[i+2];
      neighborBuf[neighborStart[a] + fillCursor[a]++] = b;
      neighborBuf[neighborStart[a] + fillCursor[a]++] = c;
      neighborBuf[neighborStart[b] + fillCursor[b]++] = a;
      neighborBuf[neighborStart[b] + fillCursor[b]++] = c;
      neighborBuf[neighborStart[c] + fillCursor[c]++] = a;
      neighborBuf[neighborStart[c] + fillCursor[c]++] = b;
    }
    let cur = heights;
    let nxt = new Float32Array(numVerts);
    const smoothPasses = 6;
    const lambda = 0.55;
    for (let iter = 0; iter < smoothPasses; iter++) {
      for (let v = 0; v < numVerts; v++) {
        if (isBoundary[v]) { nxt[v] = cur[v]; continue; }
        const s = neighborStart[v], e = neighborStart[v + 1];
        let sum = 0;
        for (let k = s; k < e; k++) sum += cur[neighborBuf[k]];
        const avg = sum / (e - s);
        nxt[v] = cur[v] + lambda * (avg - cur[v]);
      }
      const t = cur; cur = nxt; nxt = t;
    }
    // Restore the peak so total thickness stays consistent after smoothing.
    let smMax = 0;
    for (let v = 0; v < numVerts; v++) if (cur[v] > smMax) smMax = cur[v];
    if (smMax > 0) {
      const k = thickness / smMax;
      for (let v = 0; v < numVerts; v++) cur[v] *= k;
    }
    const finalHeights = cur;

    // Build front + back halves with SHARED boundary vertices (height ≈ 0).
    // This gives a single averaged normal at the silhouette so Three.js
    // shades the front-to-back transition smoothly instead of seam-sharp.
    const frontMap = new Int32Array(numVerts);
    const backMap  = new Int32Array(numVerts);
    for (let v = 0; v < numVerts; v++) {
      const x =  pos[v*2];
      const y = -pos[v*2+1]; // opentype Y-up → three.js Y-up screen
      if (finalHeights[v] <= boundaryThresh) {
        const id = finalPos.length / 3;
        finalPos.push(x, y, 0);
        frontMap[v] = id;
        backMap[v]  = id;
      } else {
        const fId = finalPos.length / 3;
        finalPos.push(x, y,  finalHeights[v]);
        const bId = fId + 1;
        finalPos.push(x, y, -finalHeights[v]);
        frontMap[v] = fId;
        backMap[v]  = bId;
      }
    }

    // Emit faces. Front winding is reversed because the Y-flip inverted it;
    // Back uses the original triangle order so its outward normal points -Z.
    for (let i = 0; i < idx.length; i += 3) {
      const a = idx[i], b = idx[i+1], c = idx[i+2];
      finalIdx.push(frontMap[a], frontMap[c], frontMap[b]);
      finalIdx.push(backMap[a],  backMap[b],  backMap[c]);
    }
  }

  if (finalIdx.length === 0) return null;

  const positions = new Float32Array(finalPos);
  const numFinalVerts = positions.length / 3;
  const IndexCtor = numFinalVerts > 65535 ? Uint32Array : Uint16Array;
  const indices = new IndexCtor(finalIdx);

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setIndex(new THREE.BufferAttribute(indices, 1));
  geom.computeVertexNormals();

  // Center about origin so OrbitControls rotate naturally.
  const cx = (gMinX + gMaxX) * 0.5;
  const cy = -(gMinY + gMaxY) * 0.5;
  geom.translate(-cx, -cy, 0);
  return { geom, bbox: new THREE.Box3().setFromBufferAttribute(geom.attributes.position) };
}

function applyMaterialFromParams(params) {
  material.color.set(params.fill);
  material.roughness = 1 - params.glossy * 0.85;
  material.clearcoatRoughness = 0.02 + (1 - params.glossy) * 0.5;
  material.needsUpdate = true;
}

window.update3D = function(rings, params) {
  applyMaterialFromParams(params);
  const result = buildBalloonMesh(rings, params);
  disposeMesh();
  if (!result) { needsRender = true; return; }
  currentMesh = new THREE.Mesh(result.geom, material);
  scene.add(currentMesh);
  fitCamera(result.bbox);
  needsRender = true;
};

window.set3DColor = function(col) {
  material.color.set(col);
  needsRender = true;
};

window.set3DGlossy = function(g) {
  material.roughness = 1 - g * 0.85;
  material.clearcoatRoughness = 0.02 + (1 - g) * 0.5;
  material.needsUpdate = true;
  needsRender = true;
};
</script>

<script>
const $ = (id) => document.getElementById(id);
const status = (m) => { $('status').textContent = m; };
const setSpin = (on) => $('spin').classList.toggle('on', on);

/* ============================================================
   WORKER
   ============================================================ */
const worker = new Worker('worker.js');
let nextJobId = 1;
let inflightId = 0;
let queuedJob = null;
const jobCallbacks = new Map();

worker.onmessage = (e) => {
  const { id, ok, error, d, bbox, rings } = e.data;
  const cb = jobCallbacks.get(id);
  jobCallbacks.delete(id);
  if (cb) cb(ok ? { d, bbox, rings } : { error });
  if (id === inflightId) {
    inflightId = 0;
    if (queuedJob) {
      const { msg, transfer, callback } = queuedJob;
      queuedJob = null;
      sendJob(msg, transfer, callback);
    }
  }
};
function sendJob(msg, transfer, callback) {
  if (inflightId !== 0) {
    queuedJob = { msg, transfer, callback };
    return;
  }
  const id = nextJobId++;
  inflightId = id;
  msg.id = id;
  jobCallbacks.set(id, callback);
  worker.postMessage(msg, transfer);
}

/* ============================================================
   GLYPH FLATTENING (cached)
   ============================================================ */
const FLATTEN_STEPS = 10;
const glyphCache = new Map();
let currentFont = null;

function flattenChar(ch) {
  let entry = glyphCache.get(ch);
  if (entry) return entry;
  if (!currentFont) return null;
  const glyph = currentFont.charToGlyph(ch);
  const path = glyph.getPath(0, 0, 200);
  const cmds = path.commands;
  const polys = [];
  let current = null;
  let cx = 0, cy = 0, sx = 0, sy = 0;
  for (let i = 0; i < cmds.length; i++) {
    const c = cmds[i];
    if (c.type === 'M') {
      if (current && current.length > 4) polys.push(new Float64Array(current));
      current = [cx = sx = c.x, cy = sy = c.y];
    } else if (c.type === 'L') {
      current.push(c.x, c.y); cx = c.x; cy = c.y;
    } else if (c.type === 'Q') {
      const dist = Math.hypot(c.x - cx, c.y - cy);
      const n = Math.max(2, Math.min(FLATTEN_STEPS, Math.ceil(dist / 10)));
      for (let k = 1; k <= n; k++) {
        const t = k / n, u = 1 - t;
        current.push(u*u*cx + 2*u*t*c.x1 + t*t*c.x,
                     u*u*cy + 2*u*t*c.y1 + t*t*c.y);
      }
      cx = c.x; cy = c.y;
    } else if (c.type === 'C') {
      const dist = Math.hypot(c.x - cx, c.y - cy);
      const n = Math.max(2, Math.min(FLATTEN_STEPS, Math.ceil(dist / 10)));
      for (let k = 1; k <= n; k++) {
        const t = k / n, u = 1 - t;
        current.push(u*u*u*cx + 3*u*u*t*c.x1 + 3*u*t*t*c.x2 + t*t*t*c.x,
                     u*u*u*cy + 3*u*u*t*c.y1 + 3*u*t*t*c.y2 + t*t*t*c.y);
      }
      cx = c.x; cy = c.y;
    } else if (c.type === 'Z') {
      cx = sx; cy = sy;
    }
  }
  if (current && current.length > 4) polys.push(new Float64Array(current));
  const advance = (glyph.advanceWidth || currentFont.unitsPerEm * 0.5)
                  * (200 / currentFont.unitsPerEm);
  entry = { polys, advance };
  glyphCache.set(ch, entry);
  return entry;
}

/* ============================================================
   PARAMS / RENDER
   ============================================================ */
let dragging = false;

function readParams() {
  return {
    text: $('text').value || ' ',
    inflate: +$('inflate').value,
    blur: +$('blur').value,
    spacing: +$('spacing').value,
    merge: $('merge').checked,
    fill: $('fill').value,
    threeD: $('threeD').checked,
    outlineOn: $('outline').checked,
    outlineW: +$('outlineW').value,
    quality: +$('quality').value,
    liveDrag: $('liveDrag').checked,
    mode3d: $('mode3d').checked,
    thickness: +$('thickness').value,
    meshDensity: +$('meshDensity').value,
    glossy: +$('glossy').value,
  };
}

let lastRings = null;
let rafScheduled = false;
function render() {
  if (rafScheduled) return;
  rafScheduled = true;
  requestAnimationFrame(() => {
    rafScheduled = false;
    if (!currentFont) return;
    submitJob();
  });
}

function submitJob() {
  const p = readParams();
  const glyphPolys = [];
  const cursorOffsets = [];
  let cursorX = 0;
  for (const ch of p.text) {
    if (ch === ' ') { cursorX += 80 + p.spacing; continue; }
    const entry = flattenChar(ch);
    if (!entry) continue;
    glyphPolys.push(entry.polys);
    cursorOffsets.push(cursorX);
    cursorX += entry.advance + p.spacing;
  }
  if (glyphPolys.length === 0) {
    applyToDOM(p, { d: '', bbox: [0,0,1,1], rings: [] });
    return;
  }
  const liveLow = dragging && p.liveDrag;
  const grid = liveLow ? Math.min(0.9, p.quality) : p.quality;
  const arc = liveLow ? 4 : 8;
  const decim = liveLow ? 0.8 : 0.4;

  const msg = {
    glyphPolys, cursorOffsets,
    inflate: p.inflate,
    arcQuality: arc,
    gridRes: grid,
    blurPx: p.merge ? p.blur : 0,
    mergeAll: p.merge,
    decimateEps: decim,
  };
  setSpin(true);
  const t0 = performance.now();
  sendJob(msg, [], (res) => {
    setSpin(false);
    if (res.error) { status('Error: ' + res.error); return; }
    lastRings = res.rings || [];
    applyToDOM(p, res);
    if (p.mode3d && window.update3D && lastRings.length) {
      window.update3D(lastRings, p);
    }
    const ms = (performance.now() - t0) | 0;
    status(`Rendered in ${ms} ms${dragging ? ' (drag)' : ''}`);
  });
}

function applyToDOM(p, geom) {
  const svg = $('preview');
  const [minX, minY, maxX, maxY] = geom.bbox;
  const pad = 40;
  svg.setAttribute('viewBox', `${minX - pad} ${minY - pad} ${(maxX - minX) + pad*2} ${(maxY - minY) + pad*2}`);

  const main = $('mainPath');
  main.setAttribute('d', geom.d);
  main.setAttribute('fill', p.fill);

  const defs = $('svgDefs');
  if (p.threeD) {
    if (!defs.querySelector('#bubbleHi')) {
      defs.innerHTML = `
        <radialGradient id="bubbleHi" cx="35%" cy="25%" r="65%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.6)" />
          <stop offset="40%" stop-color="rgba(255,255,255,0.1)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
        </radialGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
          <feOffset dx="0" dy="6" result="shadow"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>`;
    }
    main.setAttribute('filter', 'url(#softShadow)');
    const hi = $('hiPath');
    hi.setAttribute('d', geom.d);
    hi.setAttribute('fill', 'url(#bubbleHi)');
    hi.style.display = '';
  } else {
    main.removeAttribute('filter');
    $('hiPath').style.display = 'none';
  }

  const ol = $('outlinePath');
  if (p.outlineOn && p.outlineW > 0) {
    ol.setAttribute('d', geom.d);
    ol.setAttribute('stroke-width', p.outlineW);
    ol.style.display = '';
  } else {
    ol.style.display = 'none';
  }
}

function applyStyleOnly() {
  const p = readParams();
  $('mainPath').setAttribute('fill', p.fill);
  if (p.threeD) {
    $('mainPath').setAttribute('filter', 'url(#softShadow)');
    $('hiPath').style.display = '';
  } else {
    $('mainPath').removeAttribute('filter');
    $('hiPath').style.display = 'none';
  }
  const ol = $('outlinePath');
  if (p.outlineOn && p.outlineW > 0) {
    ol.setAttribute('stroke-width', p.outlineW);
    ol.style.display = '';
  } else {
    ol.style.display = 'none';
  }
  if (window.set3DColor) window.set3DColor(p.fill);
}

/* ============================================================
   FONT LOADING
   ============================================================ */
async function loadFontFromUrl(url) {
  status('Loading font…');
  const res = await fetch(url, { mode: 'cors' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buf = await res.arrayBuffer();
  const bytes = new Uint8Array(buf, 0, 4);
  const sig = String.fromCharCode(...bytes);
  const magic = (bytes[0]<<24)|(bytes[1]<<16)|(bytes[2]<<8)|bytes[3];
  const ok = magic === 0x00010000 || sig === 'OTTO' || sig === 'true' || sig === 'typ1' || sig === 'wOFF' || sig === 'wOF2';
  if (!ok) throw new Error('Server returned non-font bytes — upload a .ttf instead.');
  return opentype.parse(buf);
}
async function loadFontFromFile(file) {
  return opentype.parse(await file.arrayBuffer());
}

/* ============================================================
   EXPORT (2D only)
   ============================================================ */
function downloadSvg() {
  const svg = $('preview').cloneNode(true);
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const xml = '<?xml version="1.0" encoding="UTF-8"?>\n' + svg.outerHTML;
  const blob = new Blob([xml], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bubble-text.svg'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function downloadPng() {
  const p = readParams();
  if (p.mode3d) {
    const dataURL = document.getElementById('three').toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataURL; a.download = 'bubble-text-3d.png'; a.click();
    return;
  }
  const svg = $('preview');
  const xml = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([xml], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const vb = svg.viewBox.baseVal;
    const scale = 4;
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(vb.width * scale);
    canvas.height = Math.round(vb.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(b => {
      const u = URL.createObjectURL(b);
      const a = document.createElement('a');
      a.href = u; a.download = 'bubble-text.png'; a.click();
      setTimeout(() => URL.revokeObjectURL(u), 1000);
    });
  };
  img.src = url;
}

/* ============================================================
   WIRING
   ============================================================ */
const styleOnlyIds = ['fill','threeD','outline','outlineW'];
const geomIds      = ['text','inflate','blur','spacing','merge','quality',
                      'thickness','meshDensity'];

for (const id of styleOnlyIds) {
  $(id).addEventListener('input', applyStyleOnly);
}
for (const id of geomIds) {
  $(id).addEventListener('input', render);
}
$('liveDrag').addEventListener('change', render);

$('glossy').addEventListener('input', () => {
  if (window.set3DGlossy) window.set3DGlossy(+$('glossy').value);
});

$('mode3d').addEventListener('change', () => {
  document.body.classList.toggle('mode3d-on', $('mode3d').checked);
  if ($('mode3d').checked && lastRings && lastRings.length && window.update3D) {
    window.update3D(lastRings, readParams());
  }
});

let dragEndTimer = null;
for (const id of ['inflate','blur','spacing','outlineW','quality','thickness','meshDensity','glossy']) {
  const el = $(id);
  el.addEventListener('pointerdown', () => { dragging = true; });
  el.addEventListener('keydown', () => { dragging = true; });
  const endDrag = () => {
    dragging = false;
    clearTimeout(dragEndTimer);
    dragEndTimer = setTimeout(render, 16);
  };
  el.addEventListener('pointerup', endDrag);
  el.addEventListener('pointercancel', endDrag);
  el.addEventListener('blur', endDrag);
  el.addEventListener('keyup', endDrag);
  const out = $(id + 'Val');
  if (out) {
    const sync = () => out.textContent = el.value;
    el.addEventListener('input', sync);
    sync();
  }
}

$('builtin').addEventListener('change', async (e) => {
  setSpin(true);
  try {
    currentFont = await loadFontFromUrl(e.target.value);
    glyphCache.clear();
    status('Ready.');
    render();
  } catch (err) { status('Font load failed: ' + err.message); }
  finally { setSpin(false); }
});
$('font').addEventListener('change', async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  setSpin(true);
  try {
    currentFont = await loadFontFromFile(f);
    glyphCache.clear();
    status('Loaded ' + f.name);
    render();
  } catch (err) { status('Font parse failed: ' + err.message); }
  finally { setSpin(false); }
});
$('dlSvg').addEventListener('click', downloadSvg);
$('dlPng').addEventListener('click', downloadPng);

(async () => {
  setSpin(true);
  try {
    currentFont = await loadFontFromUrl($('builtin').value);
    status('Ready.');
    render();
  } catch (e) {
    status('Default font failed: ' + e.message);
  } finally { setSpin(false); }
})();
</script>
</body>
</html>
